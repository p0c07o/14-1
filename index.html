<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14-1 Billiard Scoreboard</title>
    <style>
        /* --- DÉFINITION DES THÈMES (VARIABLES CSS) --- */
        :root {
            /* Mode Sombre (Par défaut) */
            --md-sys-color-primary: #D0E4FF;
            --md-sys-color-on-primary: #003355;
            --md-sys-color-surface: #1A1C1E;
            --md-sys-color-surface-variant: #43474E;
            --md-sys-color-on-surface: #E2E2E6;
            --md-sys-color-outline: #8D9199;
            --md-sys-color-error: #FFB4AB;
            --md-sys-color-success: #B4F0AD;
            --bg-body: #111315;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        [data-theme="light"] {
            /* Mode Clair */
            --md-sys-color-primary: #0061A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-surface: #FCFCFF;
            --md-sys-color-surface-variant: #DEE3EB;
            --md-sys-color-on-surface: #1A1C1E;
            --md-sys-color-outline: #74777F;
            --md-sys-color-error: #BA1A1A;
            --md-sys-color-success: #006E00;
            --bg-body: #F0F2F5;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Roboto', 'Segoe UI', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--md-sys-color-on-surface); 
            margin: 0; padding: 16px;
            display: flex; flex-direction: column;
            min-height: 100vh; box-sizing: border-box;
            align-items: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- HEADER : BOUTONS AJUSTÉS --- */
        .header-btns { 
            display: flex; gap: 8px; 
            width: 100%; max-width: 1000px;
            margin-bottom: 24px;
        }

        button { 
            cursor: pointer; border: none; border-radius: 28px; 
            font-weight: 500; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            white-space: nowrap;
        }

        .btn-start { 
            background-color: var(--md-sys-color-primary); 
            color: var(--md-sys-color-on-primary); 
            padding: 12px 16px; flex: 1.5; /* Largeur réduite */
            font-size: 0.85em;
        }

        .btn-undo { 
            background-color: var(--md-sys-color-surface-variant); 
            color: var(--md-sys-color-on-surface); 
            padding: 12px 16px; flex: 1.2;
            font-size: 0.85em;
        }

        .btn-theme { 
            background-color: var(--md-sys-color-surface-variant); 
            color: var(--md-sys-color-on-surface); 
            padding: 12px; flex: 0.5;
            font-size: 1.2em;
        }

        button:hover:not(:disabled) { filter: brightness(1.1); }
        button:active:not(:disabled) { transform: scale(0.95); }

        /* --- LAYOUT & CARDS --- */
        .main-container { display: flex; gap: 20px; width: 100%; max-width: 1200px; justify-content: center; }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; align-items: center; }
            .player-zone, .center-zone { width: 100% !important; max-width: 450px; }
            .center-zone { order: -1; margin-bottom: 20px; }
        }

        .player-zone, .center-zone {
            background-color: var(--md-sys-color-surface);
            border-radius: 24px; padding: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--md-sys-color-surface-variant);
            display: flex; flex-direction: column; align-items: center;
        }

        .active-player { border: 2px solid var(--md-sys-color-primary); }

        input[type="text"] { 
            background: transparent; border: none; 
            border-bottom: 1px solid var(--md-sys-color-outline); 
            color: var(--md-sys-color-primary); 
            font-size: 1.2em; text-align: center; width: 100%; margin-bottom: 15px;
        }

        /* --- TABLES --- */
        .table-wrapper { width: 280px; overflow-y: auto; max-height: 40vh; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th { 
            color: var(--md-sys-color-outline); font-weight: 500; font-size: 0.75em;
            padding: 12px 4px; border-bottom: 1px solid var(--md-sys-color-surface-variant);
            position: sticky; top: 0; background: var(--md-sys-color-surface);
        }
        td { padding: 10px 4px; border-bottom: 1px solid rgba(128,128,128,0.1); }
        .total-val { color: var(--md-sys-color-primary); font-weight: bold; }

        /* --- CENTER CONTROLS --- */
        .center-zone { width: 300px; flex-shrink: 0; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; width: 100%; }
        
        .btn-ball { background-color: var(--md-sys-color-surface-variant); color: var(--md-sys-color-on-surface); height: 48px; border-radius: 12px; }
        .btn-plus { background-color: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); height: 56px; border-radius: 16px; }
        .btn-penalty { background-color: transparent; border: 1px solid var(--md-sys-color-error); color: var(--md-sys-color-error); height: 40px; }
        
        button:disabled { opacity: 0.15; cursor: not-allowed; }

        .count-val { font-size: 3.2em; font-weight: 300; color: var(--md-sys-color-success); margin: 4px 0; }
        .label { font-size: 0.7em; color: var(--md-sys-color-outline); text-transform: uppercase; }

    </style>
</head>
<body>

    <div class="header-btns">
        <button class="btn-start" onclick="resetGame()">NOUVELLE PARTIE</button>
        <button class="btn-undo" onclick="undo()">CORRECTION</button>
        <button class="btn-theme" id="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>

    <div class="main-container">
        <div id="zone-p1" class="player-zone active-player" onclick="setActivePlayer(1)">
            <input type="text" id="name-p1" value="Joueur 1" onchange="saveNames()">
            <div class="table-wrapper">
                <table id="table-p1">
                    <thead><tr><th>Tour</th><th>Pts</th><th>Pén.</th><th>Total</th></tr></thead>
                    <tbody id="body-p1"></tbody>
                </table>
            </div>
        </div>

        <div class="center-zone">
            <span class="label">Pénalités</span>
            <div class="btn-grid">
                <button class="btn-penalty" onclick="applyPenalty(-1)">-1</button>
                <button class="btn-penalty" onclick="applyPenalty(-2)">-2</button>
                <button class="btn-penalty" onclick="applyPenalty(-15)">-15</button>
            </div>

            <hr style="opacity:0.1; margin:15px 0; width: 100%;">
            
            <span class="label">Billes sur table</span>
            <div class="count-val" id="display-count">15</div>
            
            <div class="btn-grid" id="ball-buttons"></div>
            
            <div class="btn-grid">
                <button class="btn-plus" onclick="handleSpecial(14)">+14</button>
                <button class="btn-plus" onclick="handleSpecial(15)">+15</button>
            </div>
        </div>

        <div id="zone-p2" class="player-zone" onclick="setActivePlayer(2)">
            <input type="text" id="name-p2" value="Joueur 2" onchange="saveNames()">
            <div class="table-wrapper">
                <table id="table-p2">
                    <thead><tr><th>Tour</th><th>Pts</th><th>Pén.</th><th>Total</th></tr></thead>
                    <tbody id="body-p2"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    let state = { active: 1, lastCount: 15, accumulated: 0, p1: { total: 0, turn: 1, history: [] }, p2: { total: 0, turn: 1, history: [] } };
    let undoStack = [];

    // --- GESTION DU THÈME ---
    function toggleTheme() {
        const body = document.body;
        const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }

    function loadTheme() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
    }

    // --- LOGIQUE CORE ---
    function saveStateBeforeAction() {
        undoStack.push(JSON.parse(JSON.stringify(state)));
        if (undoStack.length > 50) undoStack.shift();
    }

    function init() {
        loadTheme();
        const grid = document.getElementById('ball-buttons');
        grid.innerHTML = "";
        for (let i = 2; i <= 15; i++) {
            let b = document.createElement('button');
            b.className = 'btn-ball'; b.innerText = i; b.id = 'btn-ball-' + i;
            b.onclick = (e) => { e.stopPropagation(); finishTurn(i); };
            grid.appendChild(b);
        }
        load();
    }

    function setActivePlayer(n) {
        if (state.active !== n) { saveStateBeforeAction(); state.active = n; render(); save(); }
    }

    function applyPenalty(val) {
        saveStateBeforeAction();
        let p = state['p' + state.active];
        let currentEntry = p.history.find(h => h.turn === p.turn);
        if (!currentEntry) {
            currentEntry = { turn: p.turn, pts: 0, pen: val, total: p.total + val };
            p.history.push(currentEntry);
        } else {
            currentEntry.pen += val; currentEntry.total += val;
        }
        p.total += val; render(); save();
    }

    function handleSpecial(val) { saveStateBeforeAction(); state.accumulated += val; render(); save(); }

    function finishTurn(val) {
        saveStateBeforeAction();
        let p = state['p' + state.active];
        let pts = (state.accumulated + state.lastCount) - val;
        if (pts < 0) pts = 0;
        let currentEntry = p.history.find(h => h.turn === p.turn);
        if (!currentEntry) {
            p.history.push({ turn: p.turn, pts: pts, pen: 0, total: p.total + pts });
        } else {
            currentEntry.pts += pts; currentEntry.total += pts;
        }
        p.total += pts; p.turn++; state.lastCount = val; state.accumulated = 0;
        state.active = (state.active === 1 ? 2 : 1);
        render(); save();
    }

    function undo() { if (undoStack.length > 0) { state = undoStack.pop(); render(); save(); } }

    function render() {
        document.getElementById('zone-p1').classList.toggle('active-player', state.active === 1);
        document.getElementById('zone-p2').classList.toggle('active-player', state.active === 2);
        [1, 2].forEach(n => {
            let html = "";
            state['p' + n].history.forEach(h => {
                html += `<tr><td>${h.turn}</td><td>${h.pts}</td><td style="color:var(--md-sys-color-error)">${h.pen < 0 ? h.pen : ''}</td><td class="total-val">${h.total}</td></tr>`;
            });
            if (n === state.active && !state['p'+n].history.find(h => h.turn === state['p'+n].turn)) {
                 html += `<tr style="opacity:0.2"><td>${state['p'+n].turn}</td><td>-</td><td>-</td><td>-</td></tr>`;
            }
            const body = document.getElementById('body-p' + n);
            body.innerHTML = html;
            const wrapper = body.closest('.table-wrapper');
            wrapper.scrollTop = wrapper.scrollHeight;
        });
        const currentTotalOnTable = state.accumulated + state.lastCount;
        document.getElementById('display-count').innerText = currentTotalOnTable;
        for (let i = 2; i <= 15; i++) {
            let btn = document.getElementById('btn-ball-' + i);
            if (btn) btn.disabled = (i > currentTotalOnTable);
        }
    }

    function saveNames() {
        localStorage.setItem("p1_name", document.getElementById('name-p1').value);
        localStorage.setItem("p2_name", document.getElementById('name-p2').value);
    }
    function save() { localStorage.setItem("billiard_141_final_theme", JSON.stringify(state)); }
    function load() {
        let s = localStorage.getItem("billiard_141_final_theme");
        if (s) state = JSON.parse(s);
        document.getElementById('name-p1').value = localStorage.getItem("p1_name") || "Joueur 1";
        document.getElementById('name-p2').value = localStorage.getItem("p2_name") || "Joueur 2";
        render();
    }
    function resetGame() { if(confirm("Démarrer une nouvelle partie ?")) { localStorage.removeItem("billiard_141_final_theme"); location.reload(); } }
    window.onload = init;
</script>
</body>
</html>
